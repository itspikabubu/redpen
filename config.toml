# RedPen default configuration
# See SPEC.md for full documentation of each setting.

[models]
primary = "claude-sonnet-4-20250514"        # Primary evaluator model
secondary = "gpt-4o"                        # Secondary evaluator (reader comments)
writer = "claude-sonnet-4-20250514"          # Writer agent model
temperature = 0.7

[eval]
runs = 3                              # Evaluations per persona (median for noise reduction)
min_improvement = 0.5                 # min_score must improve by this to keep
mean_improvement = 0.3                # mean_score tiebreaker threshold

[stopping]
min_score_target = 7.5                # Stop when min_score >= this
max_iterations = 25                   # Hard stop

[focus]
# Distribute importance weights. Keys = persona filenames (without .md)
seed_founder = 25
fellow_gp = 30
lp_allocator = 25
linkedin_reader = 20

[formats.blog]
max_words = 3000
min_words = 800
personas = ["seed_founder", "fellow_gp", "lp_allocator", "linkedin_reader"]
readers = ["hn_reader", "x_reader"]

[formats.linkedin]
max_chars = 3000
min_chars = 500
hook_required = true
personas = ["linkedin_reader", "fellow_gp", "seed_founder"]
readers = ["x_reader"]

[formats.thread]
max_chars_per_tweet = 280
max_tweets = 15
personas = ["x_reader", "linkedin_reader"]
readers = ["x_reader"]
